openapi: 3.0.0
info:
  title: OpenSource Store API
  description: Interfaz para la gestión de ventas locales.
  version: 1.0.0
paths:
  /productos:
    get:
      summary: Lista catálogo institucional.
      responses:
        '200':
          description: OK
  /pedidos:
    post:
      summary: Registra una nueva compra.
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Creado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer